<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thrift Parlor - Sign Up</title>
    <link rel="stylesheet" href="css/signup.css">
    <link rel="stylesheet" href="./css/enhanced-style.css">

    <style>
    /* === LOGIN FORM STYLING === */
    .login_form {
        background-color: #471c3c !important; /* Dark purple background */
        color: white !important;
        border: 2px solid #c48828 !important; /* Gold border */
        padding: 40px 30px;
        border-radius: 15px;
        max-width: 600px;
        margin: 0 auto;
        position: relative;
        z-index: 1;
    }

    .login_box {
        background: rgba(255, 255, 255, 0.1) !important;
        border: 2px solid #c48828 !important;
    }

    .login_box input {
        color: white !important;
        background: transparent !important;
    }

    .login_box input::placeholder {
        color: rgba(255, 255, 255, 0.7) !important;
    }

    .login_title {
        color: #c48828 !important;
    }

    .login_check-label,
    .login_register {
        color: white !important;
    }

    /* === LOGO STYLING === */
    .signup-logo-container {
        text-align: center;
        margin-bottom: -60px; /* overlap the form slightly */
        position: relative;
        z-index: 2;
    }

    .signup-logo-container img {
        width: 120px;
        height: auto;
        border-radius: 50%;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        transition: transform 0.3s ease;
    }

    .signup-logo-container img:hover {
        transform: scale(1.05);
    }

    /* === ROLE SELECTION STYLING === */
    .role-selection {
        margin: 20px 0;
    }

    .role-selection p {
        margin-bottom: 10px;
        font-weight: 600;
        color: #f7d794;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .simple-radio {
        display: flex;
        gap: 25px;
        margin: 15px 0;
    }

    .simple-radio div {
        display: flex;
        align-items: center;
        gap: 8px;
        position: relative;
        padding: 8px 14px;
        border: 2px solid #c48828;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s ease;
        background: rgba(255, 255, 255, 0.05);
    }

    .simple-radio div:hover {
        background-color: rgba(196, 136, 40, 0.2);
        transform: translateY(-2px);
    }

    .simple-radio input[type="radio"] {
        appearance: none;
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        border: 2px solid #c48828;
        border-radius: 50%;
        outline: none;
        cursor: pointer;
        background: transparent;
        transition: 0.3s;
    }

    .simple-radio input[type="radio"]:checked {
        background-color: #c48828;
        box-shadow: 0 0 6px #c48828;
    }

    .simple-radio label {
        cursor: pointer;
        margin: 0;
        color: #fff;
        font-weight: 500;
        letter-spacing: 0.5px;
        transition: 0.3s ease;
    }

    .simple-radio input[type="radio"]:checked + label {
        color: #f7d794;
        font-weight: 600;
    }

    /* === RESPONSIVE === */
    @media (max-width: 600px) {
        .login_form {
            padding: 30px 20px;
            margin: 80px 20px 0;
        }

        .signup-logo-container img {
            width: 100px;
        }
    }
    </style>
</head>

<body>
    <header id="header">
        <div id="mobile-menu">
            <i class="fas fa-bars"></i>
        </div>
        <h1 class="logo-text">Thrift Parlor</h1>
        <nav>
            <ul id="navbar"></ul>
        </nav>
    </header>

    <!-- Logo floating above form -->
    <div class="signup-logo-container">
        <img src="images/Logo.jpg" alt="Thrift Parlor Logo">
    </div>

    <main class="login">
        <form class="login_form" id="signupForm" action="auth.php" method="POST">
            <h1 class="login_title">Create Account</h1>

            <div class="login_inputs">
                <div class="form-row">
                    <div class="login_box" style="flex: 1;">
                        <input type="text" name="first_name" placeholder="First Name" required>
                    </div>
                    <div class="login_box" style="flex: 1;">
                        <input type="text" name="last_name" placeholder="Last Name" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="login_box" style="flex: 1;">
                        <input type="text" name="username" placeholder="Username" required>
                    </div>
                    <div class="login_box" style="flex: 1;">
                        <input type="email" name="email" placeholder="Email ID" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="login_box" style="flex: 1;">
                        <input type="password" name="password" placeholder="Password" required>
                    </div>
                    <div class="login_box" style="flex: 1;">
                        <input type="password" name="confirm_password" placeholder="Confirm Password" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="login_box" style="flex: 1;">
                        <input type="tel" name="phone" placeholder="Phone Number">
                    </div>
                </div>

                <!-- ROLE SELECTION -->
                <div class="role-selection">
                    <p>Register as:</p>
                    <div class="simple-radio">
                        <div>
                            <input type="radio" id="user_buyer" name="user_role" value="buyer" checked>
                            <label for="user_buyer">Buyer</label>
                        </div>
                        <div>
                            <input type="radio" id="user_seller" name="user_role" value="seller">
                            <label for="user_seller">Seller</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="login_check">
                <div class="login_check-box">
                    <input type="checkbox" class="login_check-input" id="terms" name="terms" required>
                    <label for="terms" class="login_check-label">I agree to the Terms & Conditions</label>
                </div>
            </div>

            <button type="submit" class="login_button">Sign Up</button>

            <p class="login_register">ALREADY HAVE AN ACCOUNT? <a href="htmlogin.php">Log In</a></p>
        </form>
    </main>

    <script src="./js/Home.js"></script>
    <script>
    // Simple JavaScript to ensure radio buttons work
    document.addEventListener('DOMContentLoaded', function () {
        const radioButtons = document.querySelectorAll('input[name="user_role"]');
        radioButtons.forEach(radio => {
            radio.addEventListener('change', function () {
                console.log('Selected role:', this.value);
            });
        });

        // Form validation
        document.getElementById('signupForm').addEventListener('submit', function (e) {
            const password = document.querySelector('input[name="password"]').value;
            const confirmPassword = document.querySelector('input[name="confirm_password"]').value;
            const terms = document.getElementById('terms').checked;

            if (password !== confirmPassword) {
                e.preventDefault();
                alert('Passwords do not match!');
                return false;
            }

            if (!terms) {
                e.preventDefault();
                alert('Please agree to the Terms & Conditions');
                return false;
            }

            return true;
        });
    });
    </script>
</body>

</html>
