    <style>
        .role-selection {
            margin: 20px 0;
        }

        .role-selection p {
            margin-bottom: 10px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .radio-group {
            display: flex;
            gap: 20px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 10px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 5px;
            transition: all 0.3s ease;
            background: white;
        }

        .radio-option:hover {
            border-color: var(--primary-color);
        }

        .radio-checkmark {
            width: 18px;
            height: 18px;
            border: 2px solid #ccc;
            border-radius: 50%;
            position: relative;
            transition: all 0.3s ease;
        }

        .radio-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .radio-option input[type="radio"]:checked + .radio-checkmark {
            border-color: var(--primary-color);
            background-color: var(--primary-color);
        }

        .radio-option input[type="radio"]:checked + .radio-checkmark::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
        }

        .radio-option input[type="radio"]:checked ~ span:last-child {
            color: var(--primary-color);
            font-weight: 600;
        }

        /* Simple alternative if the above doesn't work */
        .simple-radio {
            display: flex;
            gap: 20px;
            margin: 15px 0;
        }

        .simple-radio div {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .simple-radio input[type="radio"] {
            margin: 0;
            cursor: pointer;
        }

        .simple-radio label {
            cursor: pointer;
            margin: 0;
        }
    </style>
</head>

    <script>
        // Simple JavaScript to ensure radio buttons work
        document.addEventListener('DOMContentLoaded', function() {
            const radioButtons = document.querySelectorAll('input[name="user_role"]');
            radioButtons.forEach(radio => {
                radio.addEventListener('change', function() {
                    console.log('Selected role:', this.value);
                });
            });

            // Form validation
            document.getElementById('signupForm').addEventListener('submit', function(e) {
                const password = document.querySelector('input[name="password"]').value;
                const confirmPassword = document.querySelector('input[name="confirm_password"]').value;
                const terms = document.getElementById('terms').checked;
                
                if (password !== confirmPassword) {
                    e.preventDefault();
                    alert('Passwords do not match!');
                    return false;
                }
                
                if (!terms) {
                    e.preventDefault();
                    alert('Please agree to the Terms & Conditions');
                    return false;
                }
                
                return true;
            });
        });
    </script>
