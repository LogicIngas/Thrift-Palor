<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Thrift Parlor</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/payment.css">
<link rel="stylesheet" href="./css/enhanced-style.css">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css" />
</head>
<body>
    <section id="header">
        <div id="mobile-menu">
            <i class="fas fa-bars"></i>
        </div>
        <div>
            <ul id="navbar">
                <li><a href="home.php">Home</a></li>
                <li><a href="Shop.php">Shop</a></li>
                <li><a href="AboutUs.html">About Us</a></li>
                <li><a href="Contact.html">Contact</a></li>
                <li><a href="orders.php">My Orders</a></li>
                <li><a id="cart-icon" href="#"><i class="fas fa-shopping-cart"></i></a></li>
            </ul>
        </div>
    </section>

    <div class="payment-container section-p1">
        <h2>Payment Details</h2>
        
        <div id="order-summary">
            <h3>Order Summary</h3>
            <div id="order-items"></div>
            <div class="total-summary">
                <span>Total:</span>
                <span id="order-total">0.00</span>
            </div>
        </div>

        <form id="payment-form" action="process_payment.php" method="POST">
            <div class="form-section">
                <h3>Shipping Address</h3>
                <div class="form-group">
                    <label for="street_address">Street Address</label>
                    <input type="text" id="street_address" name="street_address" required>
                </div>
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" name="city" required>
                </div>
                <div class="form-group">
                    <label for="province">Province</label>
                    <input type="text" id="province" name="province" required>
                </div>
                <div class="form-group">
                    <label for="postal_code">Postal Code</label>
                    <input type="text" id="postal_code" name="postal_code" required>
                </div>
                <div class="form-group">
                    <label for="shipping_method">Shipping Method</label>
                    <select id="shipping_method" name="shipping_method">
                        <option value="standard">Standard (R50.00)</option>
                        <option value="express">Express (R100.00)</option>
                    </select>
                </div>
            </div>

            <div class="form-section">
                <h3>Payment Information</h3>
                <div class="form-group">
                    <label for="cardName">Card Holder Name</label>
                    <input type="text" id="cardName" name="cardName" required>
                    <span id="cardNameError" class="error-message"></span>
                </div>
                <div class="form-group">
                    <label for="cardNumber">Card Number</label>
                    <input type="text" id="cardNumber" name="cardNumber" required>
                    <span id="cardNumberError" class="error-message"></span>
                </div>
                <div class="form-group form-row">
                    <div class="form-group-half">
                        <label for="expiryDate">Expiry Date (MM/YY)</label>
                        <input type="text" id="expiryDate" name="expiryDate" placeholder="MM/YY" required>
                        <span id="expiryDateError" class="error-message"></span>
                    </div>
                    <div class="form-group-half">
                        <label for="cvv">CVV</label>
                        <input type="text" id="cvv" name="cvv" required>
                        <span id="cvvError" class="error-message"></span>
                    </div>
                </div>
            </div>

            <input type="hidden" id="cart-data" name="cart_data">
            <input type="hidden" id="total-amount" name="total_amount">
            <button type="submit" class="place-order-btn">Place Order</button>
        </form>
    </div>
    
    <script src="./js/payment.js"></script>
    <script src="./js/Home.js"></script>
</body>
</html>
