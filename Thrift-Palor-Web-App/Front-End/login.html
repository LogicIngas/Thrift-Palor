<!DOCTYPE html>
<html>
<head>
    <title>Login | Thrift-Palor</title>
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/buttons.css">
</head>
<body>
    <div class="auth-container">
        <h1>Login</h1>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="e.g. MindOverMatter" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="e.g. aaaa@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Minimum 8 characters" required>
            </div>

            <div class="form-group">
                <label>Role</label><br>
                <input type="radio" name="role" value="buyer" id="buyer" required>
                <label for="buyer">Buyer</label>

                <input type="radio" name="role" value="seller" id="seller">
                <label for="seller">Seller</label>

                <input type="radio" name="role" value="admin" id="admin">
                <label for="admin">Admin</label>
            </div>

            <button type="submit" class="thrift-btn">Log In</button>
        </form>
        <p>New user? <a href="signup.html">Sign up</a></p>
    </div>
    <script src="javascript/login.js"></script>
</body>
</html>
