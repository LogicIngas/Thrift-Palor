<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thrift-Palor | Sign Up</title>
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/signup.css">
</head>
<body>
    <div class="auth-container">
        <h1>SignUp/Create Account</h1>
        <form id="signupForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="e.g. TechWizard" required>
            </div>
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" placeholder="e.g. Inganathi" required>
            </div>
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" placeholder="e.g. Mbobo" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone (SA Number)</label>
                <input 
                    type="tel" 
                    id="phone" 
                    pattern="(\+27|0)[6-8][0-9]{8}" 
                    placeholder="e.g. +27601234567" 
                    required
                >
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="e.g. inga@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Minimum 8 characters" minlength="8" required>
            </div>
            <button type="submit" class="thrift-btn">Sign Up</button>
        </form>
        <p>Already have an account? <a href="login.html">Log in</a></p>
    </div>
    <script src="javascript/auth.js"></script>
</body>
</html>
